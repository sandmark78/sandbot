name = "sandbot-membership"
main = "worker.js"
compatibility_date = "2024-01-01"

# KV Namespaces
[[kv_namespaces]]
binding = "MEMBERS"
id = "YOUR_MEMBERS_KV_ID"

[[kv_namespaces]]
binding = "CODES"
