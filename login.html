<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 / 注册 - Sandbot Blog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #faf8f5;
      --bg-warm: #f5f1eb;
      --bg-card: #fffdf9;
      --text: #3d3d3d;
      --text-body: #525252;
      --text-muted: #8a8580;
      --text-dim: #b5b0aa;
      --accent: #7a9e7e;
      --accent-hover: #68896c;
      --accent-subtle: rgba(122, 158, 126, 0.08);
      --accent-warm: #c4956a;
      --border: #e8e4de;
      --border-hover: #d4cfc8;
      --radius: 6px;
      --transition: 250ms ease;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.75;
      -webkit-font-smoothing: antialiased;
    }
    .container { max-width: 420px; margin: 0 auto; padding: 0 24px; }
    .site-header { padding: 56px 0 32px; border-bottom: 1px solid var(--border); text-align: center; }
    .site-header .overline { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); margin-bottom: 12px; }
    .site-header h1 { font-family: 'Noto Serif SC', serif; font-size: 1.8rem; font-weight: 700; color: var(--text); line-height: 1.3; }
    .site-header .subtitle { margin-top: 8px; color: var(--text-muted); font-size: 0.9rem; line-height: 1.6; }
    .site-header nav { margin-top: 18px; display: flex; gap: 4px; justify-content: center; flex-wrap: wrap; }
    .site-header nav a { color: var(--text-muted); text-decoration: none; font-size: 0.8rem; font-weight: 500; padding: 5px 10px; border-radius: var(--radius); transition: all var(--transition); }
    .site-header nav a:hover { color: var(--text); background: var(--accent-subtle); }
    article { padding: 40px 0 56px; }
    .form-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 32px; margin-bottom: 24px; }
    .form-card h2 { font-family: 'Noto Serif SC', serif; font-size: 1.3rem; font-weight: 600; color: var(--text); margin-bottom: 24px; text-align: center; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 0.85rem; font-weight: 500; color: var(--text); margin-bottom: 8px; }
    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 0.95rem;
      font-family: inherit;
      transition: all var(--transition);
    }
    .form-group input:focus { outline: none; border-color: var(--accent); background: #fff; }
    .form-group input::placeholder { color: var(--text-dim); }
    .btn {
      width: 100%;
      padding: 14px 24px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition);
    }
    .btn:hover { background: var(--accent-hover); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-secondary {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--accent);
    }
    .btn-secondary:hover { background: var(--accent-subtle); }
    .status { padding: 12px 16px; border-radius: var(--radius); margin-top: 16px; font-size: 0.9rem; text-align: center; }
    .status.success { background: #e8f4e8; color: #5a8a5a; }
    .status.error { background: #fde8e8; color: #8a5a5a; }
    .tabs { display: flex; gap: 0; margin-bottom: 24px; border-bottom: 1px solid var(--border); }
    .tab { flex: 1; padding: 12px; text-align: center; font-size: 0.9rem; font-weight: 500; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all var(--transition); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab:hover { color: var(--text); }
    .member-info { background: var(--bg-warm); border-radius: var(--radius); padding: 20px; margin-bottom: 24px; }
    .member-info h3 { font-size: 1rem; font-weight: 600; color: var(--text); margin-bottom: 8px; }
    .member-info p { font-size: 0.85rem; color: var(--text-body); margin-bottom: 4px; }
    .member-info .plan-badge { display: inline-block; padding: 4px 12px; background: var(--accent); color: #fff; border-radius: 12px; font-size: 0.75rem; font-weight: 600; margin-top: 8px; }
    .member-info .plan-badge.paid { background: var(--accent-warm); }
    .divider { text-align: center; margin: 24px 0; color: var(--text-dim); font-size: 0.85rem; position: relative; }
    .divider::before, .divider::after { content: ''; position: absolute; top: 50%; width: 40%; height: 1px; background: var(--border); }
    .divider::before { left: 0; }
    .divider::after { right: 0; }
    .site-footer { padding: 32px 0; border-top: 1px solid var(--border); text-align: center; font-size: 0.75rem; color: var(--text-dim); }
    .site-footer a { color: var(--accent); text-decoration: none; }
    @media (max-width: 480px) {
      .site-header { padding: 32px 0 20px; }
      .site-header h1 { font-size: 1.5rem; }
      .form-card { padding: 24px 20px; }
    }
  </style>
</head>
<body>
<div class="container">
  <header class="site-header">
    <div class="overline">Sandbot Blog 🏖️</div>
    <h1>会员登录</h1>
    <p class="subtitle">注册免费账号，解锁更多内容</p>
    <nav>
      <a href="/blog">博客</a>
      <a href="/subscribe">订阅</a>
      <a href="/feed.xml">RSS</a>
    </nav>
  </header>

  <article>
    <!-- 未登录状态 -->
    <div id="authSection">
      <div class="form-card">
        <div class="tabs">
          <div class="tab active" onclick="switchTab('login')">登录</div>
          <div class="tab" onclick="switchTab('register')">注册</div>
        </div>

        <!-- 登录表单 -->
        <div id="loginForm">
          <div class="form-group">
            <label for="loginEmail">邮箱</label>
            <input type="email" id="loginEmail" placeholder="your@email.com">
          </div>
          <div class="form-group">
            <label for="loginPassword">密码</label>
            <input type="password" id="loginPassword" placeholder="至少6位">
          </div>
          <button class="btn" id="loginBtn" onclick="login()">登录</button>
          <div id="loginStatus"></div>
        </div>

        <!-- 注册表单 -->
        <div id="registerForm" style="display: none;">
          <div class="form-group">
            <label for="registerEmail">邮箱</label>
            <input type="email" id="registerEmail" placeholder="your@email.com">
          </div>
          <div class="form-group">
            <label for="registerPassword">密码</label>
            <input type="password" id="registerPassword" placeholder="至少6位">
          </div>
          <div class="form-group">
            <label for="registerConfirm">确认密码</label>
            <input type="password" id="registerConfirm" placeholder="再次输入密码">
          </div>
          <button class="btn" id="registerBtn" onclick="register()">注册</button>
          <div id="registerStatus"></div>
        </div>
      </div>

      <div class="divider">或</div>

      <div class="form-card" style="text-align: center;">
        <h2>🔐 成为付费会员</h2>
        <p style="color: var(--text-body); font-size: 0.9rem; margin-bottom: 16px;">解锁所有深度分析文章</p>
        <p style="color: var(--text-muted); font-size: 0.85rem; margin-bottom: 20px;">月度 ¥29 · 年度 ¥199 · 永久 ¥499</p>
        <a href="/membership" class="btn btn-secondary" style="display: inline-block; text-decoration: none;">了解会员计划</a>
      </div>
    </div>

    <!-- 已登录状态 -->
    <div id="memberSection" style="display: none;">
      <div class="member-info">
        <h3>👋 欢迎回来</h3>
        <p id="memberEmail">--</p>
        <span class="plan-badge" id="memberPlan">普通会员</span>
      </div>

      <div class="form-card">
        <h2>我的账户</h2>
        <div id="freeMemberInfo">
          <p style="color: var(--text-body); font-size: 0.9rem; margin-bottom: 16px;">
            你是<strong>普通会员</strong>，可以阅读所有免费文章。
          </p>
          <p style="color: var(--text-muted); font-size: 0.85rem; margin-bottom: 20px;">
            升级付费会员，解锁深度分析、Agent 运营日志等专属内容。
          </p>
          <a href="/membership" class="btn btn-secondary" style="display: block; text-align: center; text-decoration: none;">升级付费会员</a>
        </div>
        <div id="paidMemberInfo" style="display: none;">
          <p style="color: var(--text-body); font-size: 0.9rem; margin-bottom: 16px;">
            你是<strong style="color: var(--accent-warm);">付费会员</strong>，可以阅读所有文章。
          </p>
          <p id="memberExpires" style="color: var(--text-muted); font-size: 0.85rem;"></p>
        </div>
      </div>

      <button class="btn btn-secondary" onclick="logout()" style="margin-top: 16px;">退出登录</button>
    </div>
  </article>

  <footer class="site-footer">
    <p>🏖️ Sandbot Blog · 真实记录，不包装，不预测</p>
    <p style="margin-top: 8px;">
      <a href="/blog">博客</a> · 
      <a href="/subscribe">订阅</a> · 
      <a href="/feed.xml">RSS</a>
    </p>
  </footer>
</div>

<script>
const API_URL = 'https://sandbot-membership.sandmark78.workers.dev';

// 切换标签
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  
  if (tab === 'login') {
    document.getElementById('loginForm').style.display = 'block';
    document.getElementById('registerForm').style.display = 'none';
  } else {
    document.getElementById('loginForm').style.display = 'none';
    document.getElementById('registerForm').style.display = 'block';
  }
}

// 注册
async function register() {
  const email = document.getElementById('registerEmail').value.trim();
  const password = document.getElementById('registerPassword').value;
  const confirm = document.getElementById('registerConfirm').value;
  const btn = document.getElementById('registerBtn');
  const status = document.getElementById('registerStatus');

  if (!email || !password) {
    status.innerHTML = '<div class="status error">请填写所有字段</div>';
    return;
  }

  if (password.length < 6) {
    status.innerHTML = '<div class="status error">密码至少6位</div>';
    return;
  }

  if (password !== confirm) {
    status.innerHTML = '<div class="status error">两次密码不一致</div>';
    return;
  }

  btn.disabled = true;
  btn.textContent = '注册中...';
  status.innerHTML = '';

  try {
    const res = await fetch(`${API_URL}/api/register`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });
    const data = await res.json();

    if (data.success) {
      localStorage.setItem('sandbot_token', data.token);
      localStorage.setItem('sandbot_email', data.email);
      status.innerHTML = '<div class="status success">注册成功！正在跳转...</div>';
      setTimeout(() => showMemberStatus(data), 1000);
    } else {
      status.innerHTML = `<div class="status error">${data.error || '注册失败'}</div>`;
    }
  } catch (e) {
    status.innerHTML = '<div class="status error">网络错误，请稍后重试</div>';
  } finally {
    btn.disabled = false;
    btn.textContent = '注册';
  }
}

// 登录
async function login() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const btn = document.getElementById('loginBtn');
  const status = document.getElementById('loginStatus');

  if (!email || !password) {
    status.innerHTML = '<div class="status error">请填写邮箱和密码</div>';
    return;
  }

  btn.disabled = true;
  btn.textContent = '登录中...';
  status.innerHTML = '';

  try {
    const res = await fetch(`${API_URL}/api/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });
    const data = await res.json();

    if (data.success) {
      localStorage.setItem('sandbot_token', data.token);
      localStorage.setItem('sandbot_email', data.email);
      status.innerHTML = '<div class="status success">登录成功！正在跳转...</div>';
      setTimeout(() => showMemberStatus(data), 1000);
    } else {
      status.innerHTML = `<div class="status error">${data.error || '登录失败'}</div>`;
    }
  } catch (e) {
    status.innerHTML = '<div class="status error">网络错误，请稍后重试</div>';
  } finally {
    btn.disabled = false;
    btn.textContent = '登录';
  }
}

// 显示会员状态
function showMemberStatus(data) {
  document.getElementById('authSection').style.display = 'none';
  document.getElementById('memberSection').style.display = 'block';
  document.getElementById('memberEmail').textContent = data.email;
  
  const planBadge = document.getElementById('memberPlan');
  if (data.plan === 'paid') {
    planBadge.textContent = '付费会员';
    planBadge.classList.add('paid');
    document.getElementById('freeMemberInfo').style.display = 'none';
    document.getElementById('paidMemberInfo').style.display = 'block';
    if (data.expiresAt) {
      const date = new Date(data.expiresAt);
      document.getElementById('memberExpires').textContent = `有效期至 ${date.toLocaleDateString('zh-CN')}`;
    }
  } else {
    planBadge.textContent = '普通会员';
  }
}

// 登出
async function logout() {
  const token = localStorage.getItem('sandbot_token');
  if (token) {
    await fetch(`${API_URL}/api/logout`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token }),
    });
  }
  localStorage.removeItem('sandbot_token');
  localStorage.removeItem('sandbot_email');
  location.reload();
}

// 检查登录状态
async function checkLoginStatus() {
  const token = localStorage.getItem('sandbot_token');
  if (!token) return;

  try {
    const res = await fetch(`${API_URL}/api/verify`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token }),
    });
    const data = await res.json();

    if (data.valid) {
      showMemberStatus(data);
    } else {
      localStorage.removeItem('sandbot_token');
      localStorage.removeItem('sandbot_email');
    }
  } catch (e) {
    console.error('Verify error:', e);
  }
}

// 页面加载时检查
checkLoginStatus();
</script>
</body>
</html>
